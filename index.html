<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro — Deep Work Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── TOKENS ─────────────────────────────────────────────────── */
    :root {
      --bg:          #0E0E12;
      --surface:     #16161C;
      --border:      #2A2A36;
      --muted:       #4A4A60;
      --text:        #E8E8F0;
      --sub:         #9090A8;

      --focus:       #FF5F57;   /* tomato red — the signature hue */
      --focus-dim:   #3D1A18;
      --short:       #38C96A;
      --short-dim:   #0E2E1B;
      --long:        #4FA8FF;
      --long-dim:    #0D2240;

      --accent:      var(--focus);
      --accent-dim:  var(--focus-dim);

      --r:           16px;
      --r-sm:        8px;
      --mono:        'DM Mono', monospace;
      --display:     'Syne', sans-serif;
    }

    /* ─── RESET ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
      overflow-x: hidden;
    }

    /* ─── HEADER ─────────────────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 560px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    .logo {
      font-family: var(--display);
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .logo span { color: var(--focus); }
    .settings-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--sub);
      padding: 6px 12px;
      font-family: var(--mono);
      font-size: .75rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .settings-btn:hover { border-color: var(--muted); color: var(--text); }

    /* ─── MODE TABS ──────────────────────────────────────────────── */
    .mode-tabs {
      display: flex;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 5px;
      margin-bottom: 40px;
      width: 100%;
      max-width: 560px;
    }
    .tab {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 11px;
      background: none;
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--sub);
      cursor: pointer;
      transition: background .2s, color .2s;
      letter-spacing: .03em;
    }
    .tab.active {
      color: var(--text);
      font-weight: 500;
    }
    .tab[data-mode="focus"].active    { background: var(--focus-dim); color: var(--focus); }
    .tab[data-mode="short"].active    { background: var(--short-dim); color: var(--short); }
    .tab[data-mode="long"].active     { background: var(--long-dim);  color: var(--long); }

    /* ─── TIMER CARD ─────────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 36px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, var(--accent-dim) 0%, transparent 70%);
      pointer-events: none;
      transition: background .5s;
    }

    /* ─── SVG RING ───────────────────────────────────────────────── */
    .ring-wrap {
      position: relative;
      width: 260px;
      height: 260px;
      flex-shrink: 0;
    }
    .ring-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .ring-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 6;
    }
    .ring-progress {
      fill: none;
      stroke: var(--focus);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 0;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset .9s linear, stroke .5s;
    }
    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .time-display {
      font-family: var(--display);
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
    }
    .mode-label {
      font-size: .72rem;
      color: var(--sub);
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .session-dot {
      display: flex;
      gap: 5px;
      margin-top: 8px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: background .3s;
    }
    .dot.done { background: var(--focus); }

    /* ─── CONTROLS ───────────────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .ctrl-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: none;
      border: 1px solid var(--border);
      color: var(--sub);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, color .2s, border-color .2s;
    }
    .ctrl-btn:hover { background: var(--border); color: var(--text); }
    .ctrl-btn:active { transform: scale(.95); }
    .play-btn {
      width: 68px;
      height: 68px;
      font-size: 1.5rem;
      background: var(--focus);
      border-color: var(--focus);
      color: #fff;
      border-radius: 50%;
      transition: background .3s, transform .1s, box-shadow .3s;
      box-shadow: 0 0 0 0 var(--focus);
    }
    .play-btn.running {
      box-shadow: 0 0 0 8px rgba(255, 95, 87, .15);
      animation: pulse 2s ease-in-out infinite;
    }
    .play-btn:hover { filter: brightness(1.1); }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 8px rgba(255,95,87,.15); }
      50%       { box-shadow: 0 0 0 16px rgba(255,95,87,.05); }
    }

    /* ─── STATS ROW ──────────────────────────────────────────────── */
    .stats {
      display: flex;
      gap: 0;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }
    .stat {
      flex: 1;
      padding: 14px 0;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat-val {
      font-family: var(--display);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
    }
    .stat-lbl {
      font-size: .65rem;
      color: var(--sub);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ─── TASK SECTION ───────────────────────────────────────────── */
    .task-section {
      width: 100%;
      max-width: 560px;
      margin-top: 28px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: .72rem;
      color: var(--sub);
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .add-btn {
      font-size: .72rem;
      font-family: var(--mono);
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--sub);
      padding: 4px 10px;
      cursor: pointer;
      transition: all .2s;
    }
    .add-btn:hover { border-color: var(--muted); color: var(--text); }

    .task-input-wrap {
      display: none;
      gap: 8px;
      margin-bottom: 10px;
    }
    .task-input-wrap.open { display: flex; }
    .task-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-family: var(--mono);
      font-size: .85rem;
      padding: 9px 14px;
      outline: none;
      transition: border-color .2s;
    }
    .task-input:focus { border-color: var(--muted); }
    .task-input::placeholder { color: var(--muted); }
    .save-task-btn {
      background: var(--focus);
      border: none;
      border-radius: var(--r-sm);
      color: #fff;
      font-family: var(--mono);
      font-size: .8rem;
      padding: 9px 16px;
      cursor: pointer;
      transition: filter .2s;
    }
    .save-task-btn:hover { filter: brightness(1.1); }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px 14px;
      transition: border-color .2s, background .2s;
      cursor: pointer;
    }
    .task-item:hover { border-color: var(--muted); }
    .task-item.active-task { border-color: var(--focus); background: var(--focus-dim); }
    .task-check {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--muted);
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .7rem;
      transition: all .2s;
    }
    .task-item.done-task .task-check {
      background: var(--short);
      border-color: var(--short);
      color: #fff;
    }
    .task-item.done-task .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }
    .task-text {
      flex: 1;
      font-size: .85rem;
      color: var(--text);
    }
    .task-pomos {
      font-size: .7rem;
      color: var(--muted);
    }
    .task-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: .8rem;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color .2s;
      opacity: 0;
    }
    .task-item:hover .task-del { opacity: 1; }
    .task-del:hover { color: var(--focus); }
    .empty-tasks {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: .8rem;
      border: 1px dashed var(--border);
      border-radius: var(--r-sm);
    }

    /* ─── SETTINGS MODAL ─────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .modal-title {
      font-family: var(--display);
      font-size: 1.1rem;
      font-weight: 700;
    }
    .close-btn {
      background: none;
      border: none;
      color: var(--sub);
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      transition: color .2s;
    }
    .close-btn:hover { color: var(--text); }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 28px;
    }
    .field {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .field-label { font-size: .85rem; color: var(--sub); }
    .num-input {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .num-btn {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s;
    }
    .num-btn:hover { border-color: var(--muted); }
    .num-val {
      font-family: var(--display);
      font-size: 1rem;
      font-weight: 700;
      width: 36px;
      text-align: center;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 22px;
      cursor: pointer;
      transition: background .3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .3s;
    }
    .toggle input:checked + .slider { background: var(--focus); }
    .toggle input:checked + .slider::before { transform: translateX(18px); }
    .save-settings-btn {
      width: 100%;
      padding: 12px;
      background: var(--focus);
      border: none;
      border-radius: var(--r-sm);
      color: #fff;
      font-family: var(--mono);
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: filter .2s;
    }
    .save-settings-btn:hover { filter: brightness(1.1); }

    /* ─── TOAST ──────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px 22px;
      font-size: .82rem;
      color: var(--text);
      z-index: 200;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ─── BREATHING RING ANIMATION ───────────────────────────────── */
    @keyframes ringGlow {
      0%, 100% { filter: drop-shadow(0 0 4px var(--accent)); }
      50%       { filter: drop-shadow(0 0 12px var(--accent)); }
    }
    .ring-progress.running { animation: ringGlow 2s ease-in-out infinite; }

    /* ─── RESPONSIVE ─────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .time-display { font-size: 3rem; }
      .ring-wrap { width: 220px; height: 220px; }
      .card { padding: 36px 20px 32px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .play-btn.running, .ring-progress.running { animation: none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">pomo<span>●</span>doro</div>
  <button class="settings-btn" id="openSettings">⚙ Settings</button>
</header>

<!-- MODE TABS -->
<div class="mode-tabs" role="tablist" aria-label="Timer mode">
  <button class="tab active" data-mode="focus"  role="tab" aria-selected="true">Focus</button>
  <button class="tab"        data-mode="short"  role="tab" aria-selected="false">Short Break</button>
  <button class="tab"        data-mode="long"   role="tab" aria-selected="false">Long Break</button>
</div>

<!-- TIMER CARD -->
<div class="card" id="card">
  <!-- Ring -->
  <div class="ring-wrap" aria-label="Timer progress ring">
    <svg class="ring-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle class="ring-track"    cx="50" cy="50" r="44"/>
      <circle class="ring-progress" cx="50" cy="50" r="44" id="ring"/>
    </svg>
    <div class="ring-center">
      <div class="time-display" id="timeDisplay" aria-live="polite" aria-atomic="true">25:00</div>
      <div class="mode-label"   id="modeLabel">Focus Time</div>
      <div class="session-dot"  id="sessionDots" aria-label="Session progress"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn" id="resetBtn"   aria-label="Reset timer"   title="Reset">↺</button>
    <button class="ctrl-btn play-btn" id="playBtn" aria-label="Start timer" title="Start / Pause">▶</button>
    <button class="ctrl-btn" id="skipBtn"    aria-label="Skip to next"  title="Skip">⏭</button>
  </div>

  <!-- Stats -->
  <div class="stats" role="group" aria-label="Session statistics">
    <div class="stat">
      <div class="stat-val" id="statToday">0</div>
      <div class="stat-lbl">Today</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statStreak">0</div>
      <div class="stat-lbl">Streak</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statFocus">0m</div>
      <div class="stat-lbl">Focus time</div>
    </div>
  </div>
</div>

<!-- TASKS -->
<section class="task-section" aria-label="Tasks">
  <div class="section-head">
    <span class="section-title">Tasks</span>
    <button class="add-btn" id="addTaskBtn">+ Add task</button>
  </div>
  <div class="task-input-wrap" id="taskInputWrap">
    <input class="task-input" id="taskInput" type="text" placeholder="What are you working on?" maxlength="80" aria-label="New task name" />
    <button class="save-task-btn" id="saveTaskBtn">Save</button>
  </div>
  <div class="task-list" id="taskList" aria-live="polite"></div>
</section>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settingsOverlay" role="dialog" aria-modal="true" aria-label="Settings">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Settings</span>
      <button class="close-btn" id="closeSettings" aria-label="Close settings">✕</button>
    </div>
    <div class="field-group">
      <div class="field">
        <span class="field-label">Focus duration (min)</span>
        <div class="num-input">
          <button class="num-btn" data-target="focusDur" data-dir="-1">−</button>
          <span class="num-val" id="focusDurVal">25</span>
          <button class="num-btn" data-target="focusDur" data-dir="1">+</button>
        </div>
      </div>
      <div class="field">
        <span class="field-label">Short break (min)</span>
        <div class="num-input">
          <button class="num-btn" data-target="shortDur" data-dir="-1">−</button>
          <span class="num-val" id="shortDurVal">5</span>
          <button class="num-btn" data-target="shortDur" data-dir="1">+</button>
        </div>
      </div>
      <div class="field">
        <span class="field-label">Long break (min)</span>
        <div class="num-input">
          <button class="num-btn" data-target="longDur" data-dir="-1">−</button>
          <span class="num-val" id="longDurVal">15</span>
          <button class="num-btn" data-target="longDur" data-dir="1">+</button>
        </div>
      </div>
      <div class="field">
        <span class="field-label">Sessions before long break</span>
        <div class="num-input">
          <button class="num-btn" data-target="longAfter" data-dir="-1">−</button>
          <span class="num-val" id="longAfterVal">4</span>
          <button class="num-btn" data-target="longAfter" data-dir="1">+</button>
        </div>
      </div>
    </div>
    <div class="field-group">
      <div class="toggle-row">
        <span class="field-label">Auto-start breaks</span>
        <label class="toggle"><input type="checkbox" id="autoBreak" /><span class="slider"></span></label>
      </div>
      <div class="toggle-row">
        <span class="field-label">Auto-start focus</span>
        <label class="toggle"><input type="checkbox" id="autoFocus" /><span class="slider"></span></label>
      </div>
      <div class="toggle-row">
        <span class="field-label">Sound alerts</span>
        <label class="toggle"><input type="checkbox" id="soundOn" checked /><span class="slider"></span></label>
      </div>
    </div>
    <button class="save-settings-btn" id="saveSettings">Save settings</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<script>
/* ─── STATE ─────────────────────────────────────────────────────────── */
const CIRCUMFERENCE = 2 * Math.PI * 44; // ~276.46

let settings = {
  focusDur: 25,
  shortDur: 5,
  longDur: 15,
  longAfter: 4,
  autoBreak: false,
  autoFocus: false,
  soundOn: true,
};

let state = {
  mode: 'focus',         // 'focus' | 'short' | 'long'
  running: false,
  secondsLeft: 0,
  totalSeconds: 0,
  sessionsDone: 0,       // completed focus sessions today
  streak: 0,             // consecutive sessions without a skip
  focusMinutes: 0,       // total focus minutes today
  tasks: [],
  activeTaskId: null,
  lastDate: null,        // YYYY-MM-DD for day reset
};

let intervalId = null;

/* ─── ELEMENTS ───────────────────────────────────────────────────────── */
const $ = id => document.getElementById(id);
const ring         = $('ring');
const timeDisplay  = $('timeDisplay');
const modeLabel    = $('modeLabel');
const sessionDots  = $('sessionDots');
const playBtn      = $('playBtn');
const resetBtn     = $('resetBtn');
const skipBtn      = $('skipBtn');
const card         = $('card');
const statToday    = $('statToday');
const statStreak   = $('statStreak');
const statFocus    = $('statFocus');
const taskList     = $('taskList');
const taskInput    = $('taskInput');
const taskInputWrap= $('taskInputWrap');
const addTaskBtn   = $('addTaskBtn');
const saveTaskBtn  = $('saveTaskBtn');
const overlay      = $('settingsOverlay');
const toast        = $('toast');
let toastTimeout   = null;

/* ─── PERSISTENCE ────────────────────────────────────────────────────── */
function saveLocal() {
  try {
    localStorage.setItem('pomo_settings', JSON.stringify(settings));
    localStorage.setItem('pomo_state', JSON.stringify({
      sessionsDone: state.sessionsDone,
      streak: state.streak,
      focusMinutes: state.focusMinutes,
      tasks: state.tasks,
      activeTaskId: state.activeTaskId,
      lastDate: state.lastDate,
    }));
  } catch(e) { /* storage blocked — silently degrade */ }
}

function loadLocal() {
  try {
    const s = localStorage.getItem('pomo_settings');
    if (s) Object.assign(settings, JSON.parse(s));
    const st = localStorage.getItem('pomo_state');
    if (st) {
      const parsed = JSON.parse(st);
      Object.assign(state, parsed);
    }
  } catch(e) { /* corrupt data — use defaults */ }
}

function checkDayReset() {
  const today = new Date().toISOString().slice(0,10);
  if (state.lastDate && state.lastDate !== today) {
    state.sessionsDone = 0;
    state.focusMinutes = 0;
    state.streak = 0;
  }
  state.lastDate = today;
}

/* ─── AUDIO ──────────────────────────────────────────────────────────── */
function playBeep(freq = 660, duration = 0.15, count = 3) {
  if (!settings.soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < count; i++) {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(.3, ctx.currentTime + i * 0.25);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.25 + duration);
      osc.start(ctx.currentTime + i * 0.25);
      osc.stop(ctx.currentTime + i * 0.25 + duration + 0.05);
    }
    setTimeout(() => { try { ctx.close(); } catch(_) {} }, (count * 0.25 + 0.3) * 1000);
  } catch(e) { /* AudioContext unavailable */ }
}

/* ─── TIMER CORE ─────────────────────────────────────────────────────── */
function getDuration(mode) {
  const map = { focus: settings.focusDur, short: settings.shortDur, long: settings.longDur };
  return map[mode] * 60;
}

function setMode(mode, resetTimer = true) {
  state.mode = mode;
  if (resetTimer) {
    stopTimer();
    state.totalSeconds  = getDuration(mode);
    state.secondsLeft   = state.totalSeconds;
  }
  updateAccent();
  updateTabs();
  updateDisplay();
  updateRing();
  updateModeLabel();
}

function startTimer() {
  if (state.secondsLeft <= 0) return;
  state.running = true;
  playBtn.textContent = '⏸';
  playBtn.setAttribute('aria-label', 'Pause timer');
  playBtn.classList.add('running');
  ring.classList.add('running');
  intervalId = setInterval(tick, 1000);
}

function pauseTimer() {
  state.running = false;
  clearInterval(intervalId);
  playBtn.textContent = '▶';
  playBtn.setAttribute('aria-label', 'Resume timer');
  playBtn.classList.remove('running');
  ring.classList.remove('running');
}

function stopTimer() {
  pauseTimer();
  state.secondsLeft = getDuration(state.mode);
  state.totalSeconds = state.secondsLeft;
}

function tick() {
  if (state.secondsLeft <= 0) {
    onTimerEnd();
    return;
  }
  state.secondsLeft--;
  if (state.mode === 'focus') {
    state.focusMinutes = (state.focusMinutes || 0) + (1/60);
  }
  updateDisplay();
  updateRing();
}

function onTimerEnd() {
  clearInterval(intervalId);
  state.running = false;
  playBtn.classList.remove('running');
  ring.classList.remove('running');
  playBtn.textContent = '▶';
  playBtn.setAttribute('aria-label', 'Start timer');

  if (state.mode === 'focus') {
    state.sessionsDone++;
    state.streak++;
    state.focusMinutes += 0; // already counted per-second
    incrementActiveTaskPomo();
    updateStats();
    saveLocal();
    playBeep(880, .12, 3);
    showToast('🍅 Focus session done! Take a break.');

    // Decide next break
    const nextMode = (state.sessionsDone % settings.longAfter === 0) ? 'long' : 'short';
    updateDots();
    if (settings.autoBreak) {
      setMode(nextMode);
      startTimer();
    } else {
      setMode(nextMode);
    }
  } else {
    playBeep(440, .12, 2);
    showToast('⏰ Break over. Ready to focus?');
    if (settings.autoFocus) {
      setMode('focus');
      startTimer();
    } else {
      setMode('focus');
    }
  }
}

function togglePlayPause() {
  if (state.running) {
    pauseTimer();
  } else {
    if (state.secondsLeft <= 0) {
      state.secondsLeft = getDuration(state.mode);
      state.totalSeconds = state.secondsLeft;
    }
    startTimer();
  }
}

function skipCurrent() {
  if (state.mode === 'focus') { state.streak = 0; }
  clearInterval(intervalId);
  state.running = false;
  playBtn.classList.remove('running');
  ring.classList.remove('running');
  playBtn.textContent = '▶';
  onTimerEnd();
}

/* ─── UI UPDATES ─────────────────────────────────────────────────────── */
function updateDisplay() {
  const m = Math.floor(state.secondsLeft / 60).toString().padStart(2,'0');
  const s = (state.secondsLeft % 60).toString().padStart(2,'0');
  timeDisplay.textContent = `${m}:${s}`;
  document.title = `${m}:${s} — ${modeName(state.mode)}`;
}

function updateRing() {
  const pct = state.totalSeconds > 0 ? state.secondsLeft / state.totalSeconds : 1;
  const offset = CIRCUMFERENCE * (1 - pct);
  ring.style.strokeDasharray = CIRCUMFERENCE;
  ring.style.strokeDashoffset = offset;
}

function updateAccent() {
  const colorMap = {
    focus: { a: '#FF5F57', d: '#3D1A18' },
    short: { a: '#38C96A', d: '#0E2E1B' },
    long:  { a: '#4FA8FF', d: '#0D2240' },
  };
  const { a, d } = colorMap[state.mode];
  document.documentElement.style.setProperty('--accent', a);
  document.documentElement.style.setProperty('--accent-dim', d);
  ring.style.stroke = a;
  playBtn.style.background = a;
  playBtn.style.borderColor = a;
}

function updateTabs() {
  document.querySelectorAll('.tab').forEach(t => {
    const active = t.dataset.mode === state.mode;
    t.classList.toggle('active', active);
    t.setAttribute('aria-selected', active);
  });
}

function updateModeLabel() {
  const map = { focus: 'Focus Time', short: 'Short Break', long: 'Long Break' };
  modeLabel.textContent = map[state.mode];
}

function modeName(mode) {
  const map = { focus: 'Focus', short: 'Short Break', long: 'Long Break' };
  return map[mode];
}

function updateDots() {
  sessionDots.innerHTML = '';
  const total = settings.longAfter;
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < (state.sessionsDone % total || (state.sessionsDone > 0 && state.sessionsDone % total === 0 ? total : 0)) ? ' done' : '');
    sessionDots.appendChild(d);
  }
}

function updateStats() {
  statToday.textContent  = state.sessionsDone;
  statStreak.textContent = state.streak;
  const mins = Math.round(state.focusMinutes || 0);
  statFocus.textContent  = mins >= 60
    ? `${Math.floor(mins/60)}h${mins%60 > 0 ? (mins%60)+'m' : ''}`
    : `${mins}m`;
}

/* ─── TASKS ──────────────────────────────────────────────────────────── */
function renderTasks() {
  if (state.tasks.length === 0) {
    taskList.innerHTML = '<div class="empty-tasks">No tasks yet — add one to track what you\'re working on.</div>';
    return;
  }
  taskList.innerHTML = '';
  state.tasks.forEach(task => {
    const el = document.createElement('div');
    el.className = 'task-item'
      + (task.id === state.activeTaskId ? ' active-task' : '')
      + (task.done ? ' done-task' : '');
    el.setAttribute('role', 'listitem');
    el.innerHTML = `
      <div class="task-check">${task.done ? '✓' : ''}</div>
      <span class="task-text">${escapeHtml(task.text)}</span>
      <span class="task-pomos">🍅 ${task.pomos}</span>
      <button class="task-del" data-id="${task.id}" aria-label="Delete task">✕</button>
    `;
    // Click to set active / toggle done
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('task-del')) return;
      if (task.done) {
        task.done = false;
      } else if (task.id === state.activeTaskId) {
        task.done = true;
        state.activeTaskId = null;
      } else {
        state.activeTaskId = task.id;
      }
      saveLocal();
      renderTasks();
    });
    // Delete button
    el.querySelector('.task-del').addEventListener('click', (e) => {
      e.stopPropagation();
      state.tasks = state.tasks.filter(t => t.id !== task.id);
      if (state.activeTaskId === task.id) state.activeTaskId = null;
      saveLocal();
      renderTasks();
    });
    taskList.appendChild(el);
  });
}

function addTask(text) {
  text = text.trim();
  if (!text) { showToast('⚠ Task name cannot be empty.'); return; }
  if (text.length > 80) { showToast('⚠ Task too long (max 80 chars).'); return; }
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2,5);
  state.tasks.push({ id, text, pomos: 0, done: false });
  if (!state.activeTaskId) state.activeTaskId = id;
  saveLocal();
  renderTasks();
}

function incrementActiveTaskPomo() {
  const task = state.tasks.find(t => t.id === state.activeTaskId);
  if (task) { task.pomos++; }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── SETTINGS ───────────────────────────────────────────────────────── */
const settingsFields = {
  focusDur:  { min: 1,  max: 90,  el: $('focusDurVal')  },
  shortDur:  { min: 1,  max: 30,  el: $('shortDurVal')  },
  longDur:   { min: 1,  max: 60,  el: $('longDurVal')   },
  longAfter: { min: 2,  max: 10,  el: $('longAfterVal') },
};
let tempSettings = {};

function openSettings() {
  tempSettings = { ...settings };
  settingsFields.focusDur.el.textContent  = settings.focusDur;
  settingsFields.shortDur.el.textContent  = settings.shortDur;
  settingsFields.longDur.el.textContent   = settings.longDur;
  settingsFields.longAfter.el.textContent = settings.longAfter;
  $('autoBreak').checked = settings.autoBreak;
  $('autoFocus').checked  = settings.autoFocus;
  $('soundOn').checked    = settings.soundOn;
  overlay.classList.add('open');
}

function closeSettings() {
  overlay.classList.remove('open');
}

function saveSettings() {
  settings.focusDur  = parseInt(settingsFields.focusDur.el.textContent);
  settings.shortDur  = parseInt(settingsFields.shortDur.el.textContent);
  settings.longDur   = parseInt(settingsFields.longDur.el.textContent);
  settings.longAfter = parseInt(settingsFields.longAfter.el.textContent);
  settings.autoBreak = $('autoBreak').checked;
  settings.autoFocus = $('autoFocus').checked;
  settings.soundOn   = $('soundOn').checked;
  saveLocal();
  closeSettings();
  stopTimer();
  setMode(state.mode);
  updateDots();
  showToast('✅ Settings saved.');
}

document.querySelectorAll('.num-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.target;
    const dir = parseInt(btn.dataset.dir);
    const field = settingsFields[key];
    let val = parseInt(field.el.textContent) + dir;
    val = Math.max(field.min, Math.min(field.max, val));
    field.el.textContent = val;
  });
});

/* ─── TOAST ──────────────────────────────────────────────────────────── */
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
}

/* ─── EVENT WIRING ───────────────────────────────────────────────────── */
playBtn.addEventListener('click', togglePlayPause);
resetBtn.addEventListener('click', () => { stopTimer(); updateDisplay(); updateRing(); showToast('Timer reset.'); });
skipBtn.addEventListener('click', skipCurrent);
$('openSettings').addEventListener('click', openSettings);
$('closeSettings').addEventListener('click', closeSettings);
$('saveSettings').addEventListener('click', saveSettings);
overlay.addEventListener('click', e => { if (e.target === overlay) closeSettings(); });

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (state.running) { pauseTimer(); showToast('Timer paused — mode switched.'); }
    setMode(tab.dataset.mode);
  });
});

addTaskBtn.addEventListener('click', () => {
  taskInputWrap.classList.toggle('open');
  if (taskInputWrap.classList.contains('open')) taskInput.focus();
});

saveTaskBtn.addEventListener('click', () => {
  addTask(taskInput.value);
  taskInput.value = '';
  taskInputWrap.classList.remove('open');
});

taskInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') saveTaskBtn.click();
  if (e.key === 'Escape') { taskInputWrap.classList.remove('open'); taskInput.value = ''; }
});

// Keyboard shortcut: Space to play/pause (when not focused on input)
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlayPause(); }
  if (e.code === 'KeyR')  { stopTimer(); updateDisplay(); updateRing(); }
});

/* ─── INIT ───────────────────────────────────────────────────────────── */
function init() {
  loadLocal();
  checkDayReset();
  setMode(state.mode || 'focus');
  updateStats();
  updateDots();
  renderTasks();
  saveLocal();
}

init();
</script>
</body>
</html>
